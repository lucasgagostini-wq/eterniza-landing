<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Delivery Hub — Eterniza</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

  <!-- PWA / adicionar à tela inicial -->
  <link rel="manifest" href="/hub/manifest.json" />
  <meta name="theme-color" content="#090909" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Eterniza" />
  <link rel="apple-touch-icon" href="/hub/apple-touch-icon.png" />

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#090909;--surface:#111;--surface-raised:#191919;--surface-high:#222;
      --line:rgba(255,255,255,.07);--line-strong:rgba(255,255,255,.12);--line-hard:#2a2a2a;--line-soft:#1f1f1f;
      --fg:#f0f0f0;--fg2:#d4d4d4;--muted:#7a7a7a;--muted2:#555;
      --accent:#22c55e;--accent-hover:#16a34a;--accent-soft:rgba(34,197,94,.1);--accent-border:rgba(34,197,94,.3);--accent-ink:#04130a;--accent-lt:#86efac;
      --danger:#f87171;--danger-soft:rgba(248,113,113,.1);--warning:#fbbf24;
      --gold:#d8b478;--gold-soft:#e7cfa3;--gold-bright:#fff3d6;
      --mono:'IBM Plex Mono',ui-monospace,monospace;--sans:'Space Grotesk',system-ui,sans-serif;--serif:'Playfair Display',serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{min-height:100dvh;background:
      radial-gradient(ellipse 90% 55% at 50% -10%,rgba(34,197,94,.06),transparent),
      radial-gradient(ellipse 60% 45% at 92% 96%,rgba(216,180,120,.045),transparent),
      var(--bg)}
    body{font-family:var(--sans);color:var(--fg);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100dvh}
    .grid-texture{background-color:#0a0a0a;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:32px 32px}
    ::selection{background:rgba(34,197,94,.22);color:#fff}
    .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
    /* Scroll discreto nos painéis do Hub */
    *{scrollbar-width:thin;scrollbar-color:rgba(216,180,120,.34) transparent;-ms-overflow-style:auto}
    ::-webkit-scrollbar{width:8px;height:8px;display:block}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(216,180,120,.24);border-radius:999px}
    ::-webkit-scrollbar-thumb:hover{background:rgba(216,180,120,.38)}
    a{color:inherit;text-decoration:none}
    button,input,textarea,select{font:inherit}
    input,textarea,select{width:100%;background:#0f0f0f;border:1px solid var(--line-hard);border-radius:10px;padding:10px 12px;color:var(--fg);font-size:14px;outline:none}
    input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
    textarea{resize:vertical;line-height:1.55}

    .live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 0 rgba(34,197,94,.5);animation:pulse 2s infinite;flex-shrink:0}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.45)}70%{box-shadow:0 0 0 6px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
    @keyframes feedin{from{opacity:0;transform:translateY(-7px) scale(.985)}to{opacity:1;transform:none}}
    @keyframes detailin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    @media (prefers-reduced-motion:reduce){.live-dot{animation:none}.feed-card,.section{animation:none}}

    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:10px;font-weight:600;font-size:13px;padding:9px 13px;cursor:pointer;border:1px solid var(--line-hard);background:var(--surface-raised);color:var(--fg2);transition:filter .15s,transform .07s,border-color .15s}
    .btn:hover{filter:brightness(1.18)}.btn:active{transform:scale(.98)}
    .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
    /* foco de teclado visível nos controles custom (spans viram role=button via applyA11y) */
    [role="button"]:focus-visible,.feed-card:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
    .btn.primary{background:var(--accent);color:var(--accent-ink);border-color:transparent}
    .btn.ghost{background:transparent;color:var(--muted)}
    .btn.danger{background:rgba(127,29,29,.4);color:#fca5a5;border-color:#7f1d1d}
    .btn.gold{background:linear-gradient(180deg,#e4c389,#d3ab6c);color:#1a1410;border-color:transparent}
    .btn.sm{padding:7px 10px;font-size:12px}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .wpp{display:inline-flex;align-items:center;gap:7px;background:#25a35a;color:#fff;font-weight:700;padding:10px 15px;border-radius:10px;font-size:13.5px;white-space:nowrap}
    .wpp:hover{filter:brightness(1.08)}

    .chip{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 9px;border-radius:99px}
    .ov{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#666}

    /* ===== LOGIN ===== */
    #login{display:none;min-height:100dvh;place-items:center;padding:24px}
    #login .box{width:100%;max-width:380px;text-align:center;background:rgba(17,17,17,.7);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--line-strong);border-radius:18px;padding:30px 24px;box-shadow:0 32px 80px rgba(0,0,0,.7)}
    #login .brand{font-family:var(--sans);font-weight:700;font-size:22px;color:var(--gold-soft);margin:12px 0 2px;letter-spacing:.2px}
    #login p{color:var(--muted);font-size:13.5px;margin-bottom:20px}
    #login .erro{color:#e7a17a;font-size:13px;margin-top:10px;min-height:16px}

    /* ===== SHELL ===== */
    #app{display:none;flex-direction:column;height:100dvh;overflow:hidden}
    .nav{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 18px;background:var(--surface);border-bottom:1px solid var(--line-soft)}
    .nav .left{display:flex;align-items:center;gap:10px;min-width:0}
    .nav .mark{flex-shrink:0}
    .nav .title{font-family:var(--sans);font-weight:700;font-size:16px;color:var(--gold-soft);white-space:nowrap;letter-spacing:.2px;overflow:hidden;text-overflow:ellipsis}
    .nav .sub{font-size:11px;color:var(--muted)}
    .nav .right{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .nav .who{font-size:11px;color:#666}

    .body{flex:1;display:flex;overflow:hidden;min-height:0}
    .feed{width:380px;min-width:380px;display:flex;flex-direction:column;overflow:hidden;background:#0e0e0e;border-right:1px solid var(--line-soft)}
    .feed-head{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--line-soft)}
    .feed-head .t{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#888}
    .feed-head .lv{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--accent)}
    .filters{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 14px;border-bottom:1px solid var(--line-soft)}
    .filters .f{display:flex;align-items:center;justify-content:space-between;gap:6px;min-height:42px;padding:8px 11px;border-radius:12px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--line-hard);background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));color:#bcbcc2}
    .filters .f.todos{grid-column:span 2}
    .filters .f.on{background:linear-gradient(180deg,rgba(34,197,94,.18),rgba(34,197,94,.07));border-color:var(--accent-border);color:#f0fdf4}
    .filters .f .c{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;background:rgba(255,255,255,.05);color:#9a9a9a}
    .filters .f.on .c{background:rgba(4,19,10,.4);color:var(--accent-lt)}
    .feed-list{flex:1;overflow-y:auto;overscroll-behavior:contain;padding:8px 0}

    .feed-card{margin:7px 12px;padding:12px 13px;border-radius:13px;cursor:pointer;background:#121212;border:1px solid #222;border-left:1px solid #222;animation:feedin .3s ease both}
    .feed-card:hover{background:#161616}
    .feed-card.att-folha{ border-left:3px solid #22c55e }
    .feed-card.att-davi { border-left:3px solid #f87171 }
    .feed-card.sel{background:#161616;border-color:var(--accent-border);border-left:3px solid var(--accent)}
    .feed-card .fc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    .feed-card .nm{flex:1;min-width:0;font-size:13.5px;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .feed-card .dt{flex-shrink:0;font-size:10.5px;color:var(--muted2)}
    .feed-card .for{margin:5px 0 8px;font-size:12px;color:#8a8a8a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .feed-card .for b{color:var(--gold-soft);font-weight:500}
    .feed-card .tags{display:flex;flex-wrap:wrap;gap:5px}

    .detail{flex:1;overflow-y:auto;overscroll-behavior:contain;min-width:0}
    .detail-inner{padding:14px 22px 22px;max-width:920px;margin:0 auto}
    .back{display:none;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);background:transparent;border:1px solid var(--line-hard);border-radius:9px;padding:7px 11px;cursor:pointer;margin-bottom:14px}

    .d-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:6px}
    .d-head .htags{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
    .d-head .acts{display:flex;flex-wrap:wrap;gap:7px;justify-content:flex-end}
    .d-buyer{font-size:18px;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
    .tagrole{font-size:12px;font-weight:400;color:var(--muted)}
    .d-when{font-size:11px;color:var(--muted2);margin-top:6px}

    .grid2{display:grid;grid-template-columns:1.1fr .9fr;gap:14px;margin-top:14px}
    .section{background:var(--surface);border:1px solid var(--line-hard);border-radius:14px;overflow:hidden;animation:detailin .35s ease both;display:flex;flex-direction:column}
    .section>.sh{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 15px;background:#0d0d0d;border-bottom:1px solid var(--line-soft)}
    .section>.sh .st{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#888}
    .section>.sb{padding:13px 15px}
    .icon-btn{display:inline-flex;padding:6px;border-radius:8px;border:1px solid var(--line-hard);background:transparent;color:var(--muted2);cursor:pointer;font-size:13px}
    .icon-btn:hover{filter:brightness(1.4);color:var(--accent)}

    .photo{width:100%;aspect-ratio:1;max-width:150px;object-fit:cover;border-radius:12px;border:1px solid var(--line-hard);cursor:pointer;background:#0f0f0f}
    .photo.ph{display:grid;place-items:center;color:#444;font-size:30px;cursor:default}
    /* Galeria de fotos do lead (Feature B): carrossel + arrastar-soltar */
    .gallery{display:flex;flex-direction:column;gap:7px;width:100%}
    .galframe{position:relative;width:100%;border-radius:12px;overflow:hidden;line-height:0}
    .galframe .photo{max-width:none;width:100%;border-radius:12px;display:block}
    .galframe.drop{outline:2px dashed var(--accent);outline-offset:-4px}
    .galbtn{position:absolute;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;border:none;background:rgba(0,0,0,.55);color:#fff;font-size:16px;line-height:1;cursor:pointer;display:grid;place-items:center;padding:0;z-index:2}
    .galbtn:hover{background:rgba(0,0,0,.82)}
    .galbtn.gprev{left:5px}.galbtn.gnext{right:5px}
    .galcount{position:absolute;bottom:6px;right:7px;background:rgba(0,0,0,.62);color:#fff;font-size:10.5px;font-weight:600;padding:1px 7px;border-radius:10px;line-height:1.6;z-index:2}
    .galcover{position:absolute;top:6px;left:7px;background:rgba(0,0,0,.62);color:#fde68a;font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:8px;line-height:1.4;z-index:2}
    .galdrophint{position:absolute;inset:0;display:none;place-items:center;text-align:center;background:rgba(8,20,12,.86);color:var(--accent-lt);font-size:12px;font-weight:700;line-height:1.3;padding:8px;pointer-events:none;z-index:3}
    .galframe.drop .galdrophint{display:grid}
    .galtools{display:flex;gap:5px;flex-wrap:wrap;line-height:1}
    .btn.xs{padding:4px 8px;font-size:11px;border-radius:8px;gap:4px}
    .btn.xs.danger{color:var(--danger);border-color:rgba(248,113,113,.35)}
    .btn.xs.danger:hover{background:var(--danger-soft)}
    .recip{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--gold-soft);line-height:1.2}
    .recip-rel{color:#9a9a9a;font-size:13px;margin-top:2px}
    .memory{font-style:italic;color:var(--fg2);font-size:13px;line-height:1.6;margin-top:12px;padding:10px 13px;background:#0f0f0f;border-left:2px solid var(--gold);border-radius:0 8px 8px 0}

    .kv{display:grid;grid-template-columns:1fr 1fr;gap:11px 16px}
    .kv .k{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#666;margin-bottom:2px}
    .kv .v{font-size:13.5px;color:var(--fg2);word-break:break-word}
    .kv .v.empty{color:var(--muted2)}
    .kv .v.cp{cursor:pointer}.kv .v.cp:hover{color:var(--accent-lt)}
    .kvc{display:flex;flex-wrap:wrap;gap:10px 24px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line-soft)}
    .kvc .k{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#666;margin-bottom:1px}
    .kvc .v{font-size:13.5px;color:var(--fg2);word-break:break-word}
    .kvc .v.cp{cursor:pointer}.kvc .v.cp:hover{color:var(--accent-lt)}
    .objv{font-size:13px;color:var(--fg2);line-height:1.5}

    .flow{display:flex;gap:5px;flex-wrap:wrap}
    .flow button{flex:1 1 auto;min-width:72px;font-size:11.5px;font-weight:600;padding:8px 6px;border-radius:9px;cursor:pointer;border:1px solid var(--line-hard);background:#161616;color:#9a9a9a}
    .flow button:hover{border-color:var(--accent-border);color:var(--accent-lt)}
    .flow button.done{border-color:rgba(34,197,94,.4);color:var(--accent-lt)}
    .flow button.cur{background:var(--accent);color:var(--accent-ink);border-color:transparent}

    .alert{display:flex;gap:10px;align-items:flex-start;padding:9px 13px;border-radius:11px;font-size:13px;line-height:1.55}
    .alert.warn{background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.25);color:#fdba74}
    .alert.err{background:#2d0000;border:1px solid #7f1d1d;color:#fca5a5}
    .msgbox{margin-top:11px}
    .msgrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}
    .pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:11px}
    .pills .p{font-size:11.5px;padding:6px 11px;border-radius:9px;cursor:pointer;border:1px solid var(--line-hard);background:#161616;color:#9a9a9a}
    .pills .p.on{border-color:rgba(34,197,94,.5);color:var(--accent-lt);background:var(--accent-soft)}

    .stack>*+*{margin-top:11px}
    .emptystate{display:grid;place-items:center;gap:10px;height:100%;min-height:300px;color:var(--muted2);text-align:center;padding:30px}
    .emptystate .big{font-size:34px;opacity:.5}
    .hint{display:flex;align-items:center;gap:8px;padding:11px 14px;border-radius:10px;font-size:13px;background:#0f0f0f;border:1px dashed var(--line-hard);color:#777}
    .editgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
    .editgrid label{display:block}.editgrid .full{grid-column:span 2}
    .editgrid .ov{margin-bottom:4px;display:block}

    /* ===== FOOTER ===== */
    .status{flex-shrink:0;display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:8px 18px;background:#0d0d0d;border-top:1px solid #1a1a1a;font-size:11.5px;color:#666}
    .status .m{display:inline-flex;align-items:center;gap:5px;cursor:pointer}
    .status .m:hover{color:#aaa}
    .status .m b{color:#cfcfcf;font-weight:600}
    .status .sep{color:#333}
    .status .lv{margin-left:auto;display:flex;align-items:center;gap:6px;color:var(--accent)}

    #toast{position:fixed;left:50%;bottom:60px;transform:translateX(-50%) translateY(14px);background:rgba(17,17,17,.97);backdrop-filter:blur(8px);border:1px solid var(--line-strong);color:var(--fg);padding:11px 18px;border-radius:11px;font-size:13.5px;opacity:0;pointer-events:none;transition:all .25s;z-index:80;box-shadow:0 16px 40px rgba(0,0,0,.6);max-width:90vw;text-align:center}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    #toast.err{border-color:#7f1d1d;color:#fca5a5}#toast.ok{border-color:var(--accent-border);color:var(--accent-lt)}
    #lb{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;place-items:center;z-index:90;cursor:zoom-out;padding:20px}
    #lb img{max-width:100%;max-height:90vh;border-radius:12px}

    /* busca de lead no feed (por número ou nome) */
    .feed-search{position:relative;padding:8px 12px 4px;flex-shrink:0}
    .feed-search input{padding:9px 32px 9px 12px;font-size:13px;border-radius:9px}
    .feed-search input::-webkit-search-cancel-button{-webkit-appearance:none;display:none}
    #feedSearchClear{position:absolute;right:19px;top:calc(50% + 2px);transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:13px;line-height:1;cursor:pointer;padding:4px;display:none}
    #feedSearchClear:hover{color:var(--fg)}
    .feed-search.has #feedSearchClear{display:block}

    /* ===== ANÁLISE · dashboard do funil ===== */
    #analytics{position:fixed;inset:0;z-index:70;display:none;flex-direction:column;
      background:
        radial-gradient(ellipse 70% 55% at 12% -5%,rgba(34,197,94,.08),transparent 55%),
        radial-gradient(ellipse 55% 50% at 100% 105%,rgba(216,180,120,.06),transparent 55%),
        var(--bg)}
    #analytics::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:0;
      background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
      background-size:46px 46px;
      -webkit-mask-image:radial-gradient(ellipse 95% 75% at 50% 30%,#000,transparent);mask-image:radial-gradient(ellipse 95% 75% at 50% 30%,#000,transparent)}
    #analytics>*{position:relative;z-index:1}
    .ana-head{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:13px 20px;border-bottom:1px solid var(--line-soft);background:rgba(15,15,15,.66);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px)}
    .ana-title{font-family:var(--sans);font-weight:700;font-size:16px;color:var(--gold-soft);letter-spacing:.2px}
    .ana-periods{display:flex;gap:6px}
    .ana-periods .p{font-size:12px;padding:6px 11px;border-radius:9px;cursor:pointer;border:1px solid var(--line-hard);background:#161616;color:#9a9a9a;transition:color .15s,border-color .15s,background .15s}
    .ana-periods .p:hover{color:#cfcfcf}
    .ana-periods .p.on{border-color:var(--accent-border);color:var(--accent-lt);background:var(--accent-soft)}
    /* toggle funil bot / homenagem */
    .ana-tabs{display:flex;gap:4px;background:#0d0d0d;border:1px solid var(--line-hard);border-radius:10px;padding:3px}
    .ana-tab{font-size:12px;font-weight:600;padding:5px 12px;border-radius:8px;border:none;cursor:pointer;background:transparent;color:var(--muted);transition:background .15s,color .15s}
    .ana-tab.on{background:var(--surface-high);color:var(--fg)}
    /* A/B Cakto x Yampi */
    .abwrap{margin-top:18px;border-top:1px solid var(--line-hard);padding-top:16px}
    .abwrap h4{margin:0 0 10px;font-size:13px;color:#cfcfcf;font-weight:600;letter-spacing:.2px}
    .abwrap h4 .ab-since{color:#777;font-weight:400;font-size:11px;margin-left:6px}
    .abgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .abcol{border:1px solid var(--line-hard);border-radius:12px;padding:14px;background:#161616;position:relative;transition:border-color .2s,background .2s}
    .abcol.win{border-color:var(--accent-border);background:var(--accent-soft)}
    .abcol .gw{font-size:13px;font-weight:700;color:#dcdcdc;display:flex;align-items:center;gap:6px;margin-bottom:9px}
    .abcol .gw small{color:#777;font-weight:400}
    .abcol .win-tag{position:absolute;top:11px;right:11px;font-size:10px;font-weight:700;color:var(--accent-lt);background:var(--accent-soft);border:1px solid var(--accent-border);border-radius:999px;padding:2px 8px}
    .abrow{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:#9a9a9a}
    .abrow b{color:#e8e8e8;font-weight:600}
    .abrow.hl{border-top:1px dashed var(--line-hard);margin-top:5px;padding-top:7px}
    .abrow.hl b{color:var(--accent-lt);font-size:15px}
    .ab-note{font-size:11.5px;color:#8a8a8a;margin-top:10px;line-height:1.5}
    @media(max-width:560px){.abgrid{grid-template-columns:1fr}}
    /* filtro por data (análise + feed) */
    .ana-filter{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .dt-in{font-size:12px;padding:5px 7px;border-radius:8px;border:1px solid var(--line-hard);background:#161616;color:#cfcfcf;color-scheme:dark;font-family:inherit;cursor:pointer}
    .dt-in:focus{outline:none;border-color:var(--accent-border);color:#fff}
    .ana-dates{display:flex;align-items:center;gap:6px;color:#6f6f6f;font-size:12px}
    .ana-dates .arr{opacity:.55}
    .feed-dates{display:flex;flex-wrap:wrap;align-items:center;gap:5px;padding:2px 12px 6px;flex-shrink:0}
    .feed-dates .p{font-size:11px;padding:3px 8px;border-radius:7px;cursor:pointer;border:1px solid var(--line-hard);background:#161616;color:#8f8f8f;transition:color .15s,border-color .15s,background .15s;user-select:none}
    .feed-dates .p:hover{color:#cfcfcf}
    .feed-dates .p.on{border-color:var(--accent-border);color:var(--accent-lt);background:var(--accent-soft)}
    .feed-dates .fd-range{display:flex;align-items:center;gap:4px;color:#6f6f6f;font-size:11px}
    .feed-dates .fd-range .dt-in{padding:3px 5px;font-size:11px}
    .feed-dates .fd-range .arr{opacity:.55}
    .ana-body{flex:1;min-height:0;display:flex;flex-direction:column;gap:15px;padding:18px 22px 42px;width:100%;max-width:1140px;margin:0 auto;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain}
    .ana-loading{margin:auto;color:var(--muted);font-size:14px;text-align:center}
    /* KPIs (pedidos no período) */
    .kpis{flex-shrink:0;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .kpi{position:relative;overflow:hidden;border:1px solid var(--line-soft);border-radius:14px;padding:13px 16px 13px 18px;background:linear-gradient(180deg,var(--surface-raised),var(--surface))}
    .kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--muted2)}
    .kpi.gold::before{background:linear-gradient(var(--gold),#a87f3f)}
    .kpi.accent::before{background:linear-gradient(var(--accent-lt),var(--accent))}
    .kpi .n{display:block;font-family:var(--sans);font-size:25px;font-weight:700;line-height:1;color:var(--fg);font-variant-numeric:tabular-nums}
    .kpi.gold .n{color:var(--gold-soft)}.kpi.accent .n{color:var(--accent-lt)}
    .kpi .l{display:block;font-size:11.5px;color:var(--muted);margin-top:6px}
    /* gráfico horizontal (colunas = etapas do funil) */
    .fchart-wrap{flex:1;min-height:150px;display:flex;flex-direction:column;border:1px solid var(--line-soft);border-radius:16px;padding:14px 16px 12px;background:rgba(255,255,255,.014);position:relative}
    .fchart-h{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
    .fchart-t{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:#8a8a8a;font-weight:600}
    .fchart-legend{display:flex;align-items:center;gap:12px;font-size:10.5px;color:var(--muted2)}
    .fchart-legend i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:4px;vertical-align:-1px}
    .fchart-legend .dot-g{background:var(--accent)}.fchart-legend .dot-r{background:var(--danger)}
    .fchart{flex:1;min-height:0;display:flex;align-items:stretch;gap:6px;transition:opacity .3s}
    .fcol{flex:1 1 0;min-width:60px;display:flex;flex-direction:column;align-items:center;gap:7px;min-height:0}
    .fval{flex-shrink:0;text-align:center;line-height:1.12}
    .fval .fcount{font-size:18px;font-weight:700;color:var(--fg);font-variant-numeric:tabular-nums}
    .fval .fpct{display:block;font-size:10.5px;color:var(--muted)}
    .ftrack{flex:1;min-height:0;width:100%;display:flex;align-items:flex-end;justify-content:center;
      background-image:linear-gradient(to top,var(--line) 1px,transparent 1px);background-size:100% 25%}
    .fbar{width:clamp(16px,62%,46px);height:0;border-radius:7px 7px 2px 2px;
      background:linear-gradient(180deg,var(--accent-lt),var(--accent) 55%,#15803d);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.28),0 0 18px rgba(34,197,94,.13);
      transition:height .7s cubic-bezier(.2,.7,.2,1),background .3s}
    .fbar.has{min-height:5px}
    .fbar.drop{background:linear-gradient(180deg,#fca5a5,var(--danger) 55%,#b91c1c);box-shadow:inset 0 1px 0 rgba(255,255,255,.28),0 0 18px rgba(248,113,113,.16)}
    .flabel{flex-shrink:0;font-size:11px;color:var(--fg2);text-align:center;line-height:1.15;font-weight:500;min-height:26px}
    .fkeep{flex-shrink:0;font-size:10px;color:var(--muted2);min-height:13px;text-align:center}
    .fkeep.warn{color:#fca5a5;font-weight:700}
    .fchart-empty{position:absolute;left:50%;top:56%;transform:translate(-50%,-50%);max-width:340px;text-align:center;font-size:12.5px;color:var(--muted);line-height:1.5}
    /* rodapé discreto: última atualização + início da metrificação */
    .ana-foot{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted2);line-height:1.5}
    .ana-base{flex:1 1 320px;min-width:0}
    .ana-meta{display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
    .ana-meta b{color:var(--gold-soft);font-weight:600}
    .ana-livedot{width:6px;height:6px}
    @media (max-width:720px){
      .ana-body{overflow-y:auto;overflow-x:hidden}
      .kpis{grid-template-columns:repeat(2,1fr)}
      .fchart-wrap{min-height:300px}
      .fchart{overflow-x:auto;overflow-y:hidden}
      .fcol{min-width:56px}
      .ana-meta{white-space:normal}
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width:880px){
      .feed{width:100%;min-width:0;border-right:none}
      .detail{display:none}
      body.viewing .feed{display:none}
      body.viewing .detail{display:block}
      .back{display:inline-flex}
      .grid2{grid-template-columns:1fr}
      .nav .sub,.nav .who{display:none}
      .detail-inner{padding:16px 15px 60px}
      .status{font-size:11px;gap:7px;padding:7px 14px}
    }
    @media (max-width:430px){
      .filters .f .lbl{font-size:11px}
      .kv{grid-template-columns:1fr}
      .editgrid{grid-template-columns:1fr}.editgrid .full{grid-column:span 1}
    }
  </style>

<body>
  <!-- LOGIN -->
  <section id="login">
    <div class="box">
      <div class="brand">Delivery Hub — Eterniza</div>
      <p>Área restrita</p>
      <form id="loginForm">
        <input id="senha" type="password" placeholder="Senha de administrador" autocomplete="current-password" aria-label="Senha de administrador" />
        <button class="btn primary" type="submit" style="width:100%;margin-top:10px;padding:11px">Entrar</button>
      </form>
      <div class="erro" id="loginErro"></div>
    </div>
  </section>

  <!-- APP -->
  <div id="app">
    <nav class="nav">
      <div class="left">
        <div style="min-width:0">
          <div class="title">Delivery Hub — Eterniza</div>
          <div class="sub">homenagem em vídeo</div>
        </div>
      </div>
      <div class="right">
        <span class="who" id="who"></span>
        <button class="btn ghost sm" id="btnInstall" style="display:none">⬇ Instalar app</button>
        <button class="btn ghost sm" id="btnAnalytics">📊 Análise</button>
        <button class="btn ghost sm" id="btnLogout">Sair</button>
      </div>
    </nav>

    <div class="body">
      <aside class="feed">
        <div class="feed-search">
          <input id="feedSearch" type="search" placeholder="🔍 Buscar lead por número ou nome…" autocomplete="off" spellcheck="false" inputmode="search" aria-label="Buscar lead por número ou nome">
          <button id="feedSearchClear" type="button" title="Limpar busca" aria-label="Limpar busca">✕</button>
        </div>
        <div class="feed-dates" id="attFilters"></div>
        <div class="feed-dates" id="feedDates">
          <span class="p on" data-fpreset="tudo">Tudo</span>
          <span class="p" data-fpreset="hoje">Hoje</span>
          <span class="p" data-fpreset="ontem">Ontem</span>
          <span class="fd-range"><input type="date" class="dt-in" id="feedFrom" title="Data inicial"><span class="arr">→</span><input type="date" class="dt-in" id="feedTo" title="Data final"></span>
        </div>
        <div class="filters" id="filters"></div>
        <div class="feed-list scrollbar-hide" id="feedList"><div class="hint" style="margin:14px">Carregando pedidos…</div></div>
      </aside>

      <main class="detail grid-texture" id="detail">
        <div class="detail-inner"><div class="emptystate"><div class="big">🕊️</div><div>Selecione um pedido para ver os detalhes.</div></div></div>
      </main>
    </div>

    <footer class="status" id="status"></footer>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>
  <div id="lb" role="dialog" aria-modal="true" aria-label="Foto ampliada"><img src="" alt="Foto ampliada"></div>

  <!-- PAINEL DE ANÁLISE (funil) -->
  <div id="analytics">
    <div class="ana-head">
      <span class="ana-title">📊 Análise do funil</span>
      <div class="ana-tabs">
        <button class="ana-tab on" id="tabBot" onclick="setFunnelMode('bot')">📱 Bot</button>
        <button class="ana-tab" id="tabH" onclick="setFunnelMode('homenagem')">🖼️ Prévia</button>
      </div>
      <div class="ana-filter">
        <div class="ana-periods">
          <span class="p on" data-preset="hoje">Hoje</span>
          <span class="p" data-preset="ontem">Ontem</span>
          <span class="p" data-preset="7d">7 dias</span>
          <span class="p" data-preset="30d">30 dias</span>
          <span class="p" data-preset="tudo">Tudo</span>
        </div>
        <div class="ana-dates"><input type="date" class="dt-in" id="anaFrom" title="Data inicial"><span class="arr">→</span><input type="date" class="dt-in" id="anaTo" title="Data final"></div>
      </div>
      <button class="btn ghost sm" id="anaClose">✕ Fechar</button>
    </div>
    <div class="ana-body" id="funnelView"></div>
  </div>

  <script>
  /* ============================================================================
     DELIVERY HUB — Eterniza · front-end (vanilla JS, sem build/framework)
     ----------------------------------------------------------------------------
     SPA de 1 arquivo, servida estática pela Vercel; conversa SÓ com /api/hub
     (mesmo token do login, no header x-admin-token). É de propósito sem framework:
     a ferramenta precisa ser editável na unha, à prova de balas e leve no celular.

     Mapa do arquivo (de cima pra baixo):
       • Estado global ........ token, ORDERS[], FILTER, selId, datas, ATT_FILTER
       • Constantes/UI ........ TAG (status→cor), ATT (atendente), FILTERS, mensagens
       • Helpers .............. esc/fmt/money/waLink, copyText (cópia robusta), applyA11y
       • api() ................ wrapper de fetch (querystring + token + trata 401/429)
       • Galeria .............. carrossel de fotos do lead + arrastar-soltar
       • RENDER ............... renderFilters/Feed/Detail/Status — reconcile sem flicker
       • EVENTOS .............. 1 listener de click delegado + drag/drop + busca
       • load()/silentLoad() .. carga inicial + refresh silencioso a cada 10s
       • ANÁLISE ............. painel de funil + A/B (fetch próprio, refresh 20s)
     Acessibilidade: spans clicáveis viram role=button/tabindex via applyA11y();
     o keydown global converte Enter/Espaço em clique. Toast tem aria-live.
     ============================================================================ */
    const $ = id => document.getElementById(id);
    const TKEY = 'eterniza_admin_token';
    let token = sessionStorage.getItem(TKEY) || '';
    let ORDERS = [], FILTER = 'produzir', selId = null, editing = false, initialFilterSet = false, userCleared = false;
    let autoTimer = null, sig = '', selSig = '';
    let deferredPrompt = null;
    const isDesktop = () => window.matchMedia('(min-width:881px)').matches;

    // status -> rótulo + cor do chip
    const TAG = {
      briefing_recebido:{l:'Briefing',c:'#85b7eb,#185fa5,rgba(55,138,221,.14)'},
      checkout_iniciado:{l:'Checkout',c:'#facc15,#854f0b,rgba(234,179,8,.14)'},
      recuperacao_pix:{l:'Pix não pago',c:'#fb923c,#993c1d,rgba(249,115,22,.14)'},
      pago:{l:'Pago',c:'#22c55e,#0f6e2f,rgba(34,197,94,.14)'},
      fila_edicao:{l:'Fila de edição',c:'#2dd4bf,#0f6e56,rgba(20,184,166,.14)'},
      produzindo:{l:'Produzindo',c:'#a78bfa,#3c3489,rgba(139,92,246,.14)'},
      pronta:{l:'Pronta',c:'#85b7eb,#185fa5,rgba(55,138,221,.14)'},
      entregue:{l:'Entregue',c:'#86efac,#27500a,rgba(34,197,94,.18)'},
      erro:{l:'Erro',c:'#f87171,#791f1f,rgba(239,68,68,.16)'},
    };
    const FLOW = ['pago','fila_edicao','produzindo','pronta','entregue'];
    const FLOW_LBL = {pago:'Pago',fila_edicao:'Fila',produzindo:'Produzindo',pronta:'Pronta',entregue:'Entregue'};
    const PRODUZIR = ['pago','fila_edicao','produzindo','pronta'];
    const RECUPERAR = ['recuperacao_pix','checkout_iniciado','briefing_recebido'];
    const RECOVERY = [['contatado','Contatado'],['convertido','Convertido ✓'],['descartado','Descartado']];
    // tag de recuperação visível no card (nao_contatado / sem_resposta => sem tag)
    const RECO_TAG = { contatado:['Contatado','#7cc0ff','rgba(96,165,250,.13)'], convertido:['Convertido ✓','#86efac','rgba(34,197,94,.15)'], descartado:['Descartado','#fca5a5','rgba(248,113,113,.13)'] };
    function recoTag(o){ const t=RECO_TAG[o&&o.recovery_contact_status]; return t?`<span class="chip" style="color:${t[1]};background:${t[2]};border:1px solid ${t[1]}33">${esc(t[0])}</span>`:''; }
    const ATT = { folha:['🌿 Folha','#22c55e','rgba(34,197,94,.14)'], davi:['🔥 Davi','#f87171','rgba(248,113,113,.14)'] };
    function attTag(o){ const t=ATT[o&&o.attendant]; return t?`<span class="chip" style="color:${t[1]};background:${t[2]};border:1px solid ${t[1]}33">${t[0]}</span>`:`<span class="chip" style="color:#9ca3af;background:rgba(255,255,255,.05);border:1px solid #ffffff14">○ Livre</span>`; }
    function sourceTag(o){ const s=(o.typebot_payload||{}).source; if(s==='homenagem') return '<span class="chip" style="color:#c084fc;background:rgba(192,132,252,.12);border:1px solid #c084fc33">✨ Prévia</span>'; if(o.typebot_payload) return '<span class="chip" style="color:#67e8f9;background:rgba(103,232,249,.1);border:1px solid #67e8f933">🤖 Bot</span>'; return ''; }
    // ⚡ só enquanto a confirmação automática NÃO saiu; ✅ quando já foi enviada
    const confirmTag=o=>{ if(!o||!['pago','fila_edicao'].includes(o.status)) return ''; return o.wa_confirm_sent_at?'<span class="chip" style="background:rgba(34,197,94,.14);color:#86efac;border:1px solid rgba(34,197,94,.35)">✅ confirmado</span>':'<span class="chip" style="background:rgba(251,191,36,.14);color:#fcd34d;border:1px solid rgba(251,191,36,.35)">⚡ confirmar</span>'; };
    const ALL_STATUS = ['briefing_recebido','checkout_iniciado','recuperacao_pix','pago','fila_edicao','produzindo','pronta','entregue','erro'];
    const FILTERS = [
      {key:'recuperar',label:'Recuperar',test:o=>RECUPERAR.includes(o.status)},
      {key:'produzir',label:'Produzir',test:o=>PRODUZIR.includes(o.status)},
      {key:'entregues',label:'Entregues',test:o=>o.status==='entregue'},
      {key:'erro',label:'Erro',test:o=>o.status==='erro'},
      {key:'todos',label:'Todos',test:()=>true},
    ];

    const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const fmt = iso=>{try{return new Date(iso).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}catch(e){return ''}};
    const fmtFull = iso=>{try{return new Date(iso).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'})}catch(e){return '—'}};
    const money = v=>v==null?null:'R$ '+Number(v).toFixed(2).replace('.',',');
    const waLink=(phone,text)=>`https://wa.me/${(phone||'').replace(/\D/g,'')}?text=${encodeURIComponent(text)}`;
    // remove DDI 55 do número antes de exibir/copiar (wa.me precisa do 55; exibição não)
    const stripCC=p=>(p||'').replace(/\D/g,'').replace(/^55(\d{10,11})$/,'$1');
    const firstName = n => (n||'').trim().split(/\s+/)[0]||'';
    // 2º WhatsApp (número alternativo) — guardado em recovery_notes como "tel2:<norm>"
    const phone2 = o => { const m=String((o&&o.recovery_notes)||'').match(/tel2:(\d{12,13})/); return m?m[1]:''; };
    // IP/região de onde o lead acessou (capturado no cadastro, guardado em typebot_payload)
    function ipLine(o){ const tp=(o&&o.typebot_payload)||{}; const ip=tp._ip,geo=tp._geo,at=tp._ip_at; if(!ip&&!geo) return ''; return `<div class="mono" style="font-size:10.5px;color:var(--muted2);margin-top:4px" title="IP/região de onde o lead acessou">🌐 ${ip?esc(ip):'IP n/d'}${geo?' · '+esc(geo):''}${at?' · '+esc(fmt(at)):''}</div>`; }
    function chip(status){const t=TAG[status]||{l:status,c:'#9ca3af,#444,rgba(255,255,255,.06)'};const[fg,,bgc]=t.c.split(',');const bg=t.c.split(',').slice(2).join(',');return `<span class="chip" style="color:${fg};background:${bg};border:1px solid ${fg}33">${esc(t.l)}</span>`;}
    function toast(m,kind){const t=$('toast');t.textContent=m;t.className='show'+(kind?' '+kind:'');clearTimeout(toast._t);toast._t=setTimeout(()=>t.className='',2400)}

    // Cópia robusta — antes o código dava "Copiado ✓" mesmo quando a escrita falhava (permissão
    // negada / contexto sem HTTPS). Aqui só confirma quando REALMENTE copiou; com fallback legado.
    async function copyText(text,okMsg){
      text=text==null?'':String(text);
      try{
        if(navigator.clipboard&&window.isSecureContext){ await navigator.clipboard.writeText(text); }
        else{
          const ta=document.createElement('textarea');
          ta.value=text; ta.setAttribute('readonly',''); ta.style.cssText='position:fixed;top:0;left:0;opacity:0';
          document.body.appendChild(ta); ta.select();
          const ok=document.execCommand&&document.execCommand('copy'); ta.remove();
          if(!ok) throw new Error('execCommand_copy_failed');
        }
        toast(okMsg||'Copiado ✓','ok');
      }catch(e){ toast('Não consegui copiar — selecione e copie manualmente','err'); }
    }

    // ===== Acessibilidade: controles custom (spans clicáveis) operáveis por teclado =====
    // Filtros, pills e toggles são <span> com data-*; sem role/tabindex não recebem foco nem
    // respondem a Enter/Espaço. applyA11y() roda após cada render (idempotente); o keydown global
    // converte Enter/Espaço no controle focado em clique (o listener de click delegado trata o resto).
    const A11Y_SEL='[data-f],[data-rc],[data-att],[data-fpreset],[data-preset],[data-fatt],[data-sel]';
    function applyA11y(root){
      (root||document).querySelectorAll(A11Y_SEL).forEach(el=>{
        if(!el.hasAttribute('role')) el.setAttribute('role','button');
        if(!el.hasAttribute('tabindex')) el.setAttribute('tabindex','0');
      });
    }
    document.addEventListener('keydown',e=>{
      if(e.key!=='Enter'&&e.key!==' ')return;
      const el=document.activeElement;
      if(el&&el.matches&&el.matches(A11Y_SEL)){ e.preventDefault(); el.click(); }
    });

    // Rede de segurança: nada de erro silencioso — vai pro console (ajuda a depurar no celular).
    window.addEventListener('unhandledrejection',ev=>console.error('[hub] rejeição não tratada:',ev&&ev.reason));
    window.addEventListener('error',ev=>{ if(ev&&ev.error) console.error('[hub] erro não tratado:',ev.error); });

    // ===== filtro por data (fuso LOCAL do operador, ex.: BRT) — feed + análise =====
    const pad2=n=>String(n).padStart(2,'0');
    function ymdLocal(off){ const d=new Date(); if(off)d.setDate(d.getDate()+off); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
    function ymdToMid(s){ if(!s)return null; const p=String(s).split('-').map(Number); if(p.length!==3||!p[0])return null; return new Date(p[0],p[1]-1,p[2],0,0,0,0); }
    // "Até" é INCLUSIVO do dia inteiro: limite superior = meia-noite do dia SEGUINTE (exclusivo)

    // ---- Galeria (Feature B): arrastar-soltar + seletor de arquivo + redução no browser ----
    async function uploadGalleryFile(id,file){
      if(!file||!/^image\//.test(file.type||'')){toast('Arraste um arquivo de imagem','err');return}
      try{
        const dataUrl=await shrinkImage(file,1280,.85);
        const d=await api('add_photo',{id},{method:'POST',body:{image:dataUrl}});
        const o=ORDERS.find(x=>x.id===id);
        if(o){o.photos=Array.isArray(d.photos)?d.photos:(o.photos||[]);if(d.photo_url)o.photo_url=d.photo_url;GAL_IDX[id]=Math.max(0,galleryList(o).length-1)}
        selSig='';renderDetail();toast('Foto adicionada ✓','ok');
      }catch(e){handleErr(e,'Falha ao enviar foto')}
    }
    // reduz no navegador (lado máx N) -> dataURL jpeg leve (upload rápido e abaixo do limite do serverless)
    function shrinkImage(file,max,q){return new Promise((res,rej)=>{const img=new Image(),u=URL.createObjectURL(file);img.onload=()=>{let w=img.naturalWidth,h=img.naturalHeight;if(w>max||h>max){const s=Math.min(max/w,max/h);w=Math.round(w*s);h=Math.round(h*s)}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);URL.revokeObjectURL(u);res(c.toDataURL('image/jpeg',q))};img.onerror=()=>{URL.revokeObjectURL(u);rej(new Error('img_load'))};img.src=u})}
    document.addEventListener('dragover',ev=>{const z=ev.target.closest&&ev.target.closest('[data-galdrop]');if(z&&ev.dataTransfer&&[...(ev.dataTransfer.types||[])].includes('Files')){ev.preventDefault();z.classList.add('drop')}});
    document.addEventListener('dragleave',ev=>{const z=ev.target.closest&&ev.target.closest('[data-galdrop]');if(z&&!z.contains(ev.relatedTarget))z.classList.remove('drop')});
    document.addEventListener('drop',async ev=>{const z=ev.target.closest&&ev.target.closest('[data-galdrop]');if(!z)return;ev.preventDefault();z.classList.remove('drop');const id=z.dataset.galdrop,files=[...((ev.dataTransfer&&ev.dataTransfer.files)||[])].filter(f=>/^image\//.test(f.type||''));for(const f of files)await uploadGalleryFile(id,f)});
    document.addEventListener('change',async ev=>{const fi=ev.target;if(fi.tagName==='INPUT'&&fi.type==='file'&&fi.dataset.galfile){const id=fi.dataset.galfile,files=[...(fi.files||[])];fi.value='';for(const f of files)await uploadGalleryFile(id,f)}});

    const SHORT={pagina_venda:'Página',cta_clicou:'Clicou CTA',g1_abertura:'Abertura',g2_porquem:'Por quem',g3_nome:'Nome',g4_memoria:'Memória',g5_desejo:'Desejo',g6_video:'Vídeo',g7_foto:'Foto',g8_whatsapp:'WhatsApp',h_hero:'Pág. H',h_quiz:'CTA hero',h_nome:'Q1 quem',h_memoria:'Q2 nome',h_whatsapp:'WhatsApp',h_foto:'Foto',h_previa:'Prévia',h_checkout:'Finalizar'};

    function buildFunnelSkeleton(funnel){
      const cols=funnel.map(s=>`<div class="fcol" data-step="${esc(s.step)}" title="${esc(s.label)}">
          <div class="fval"><span class="fcount">0</span><span class="fpct">0%</span></div>
          <div class="ftrack"><div class="fbar"></div></div>
          <div class="flabel">${esc(SHORT[s.step]||s.label)}</div>
          <div class="fkeep"></div>
        </div>`).join('');
      $('funnelView').innerHTML=`
        <div class="kpis">
          <div class="kpi gold"><span class="n" id="kOferta">–</span><span class="l">Chegaram na oferta</span></div>
          <div class="kpi"><span class="n" id="kRecup">–</span><span class="l">Pix em recuperação</span></div>
          <div class="kpi"><span class="n" id="kPago">–</span><span class="l">Pagaram</span></div>
          <div class="kpi accent"><span class="n" id="kConv">–</span><span class="l">Conversão oferta→pago</span></div>
        </div>
        <div class="fchart-wrap">
          <div class="fchart-h">
            <span class="fchart-t">Funil do fluxo · sessões rastreadas</span>
            <span class="fchart-legend"><span><i class="dot-g"></i>etapa</span><span><i class="dot-r"></i>maior queda</span></span>
          </div>
          <div class="fchart" id="fchart">${cols}</div>
          <div class="fchart-empty" id="fEmpty" hidden>Sem sessões rastreadas neste período ainda — os blocos vão preenchendo conforme o tráfego entrar.</div>
        </div>
        <div class="ana-foot">
          <span class="ana-base">Cards de cima = pedidos no período · gráfico = sessões rastreadas desde a página de venda (bases diferentes).</span>
          <span class="ana-meta"><span class="live-dot ana-livedot"></span>atualizado <b id="anaAgo">agora</b> · metrificando desde <b id="anaSince">—</b></span>
        </div>
        <div class="abwrap" id="quizAbWrap" hidden>
          <h4>🧪 A/B Quiz · Typebot × /homenagem <span class="ab-since" id="quizAbSince"></span></h4>
          <div class="abgrid">
            <div class="abcol" id="quizTypebot">
              <div class="gw">📱 Typebot <small>quiz atual</small></div>
              <div class="abrow"><span>Mandados</span><b id="qtAssigned">–</b></div>
              <div class="abrow"><span>Iniciou quiz</span><b id="qtStarted">–</b></div>
              <div class="abrow"><span>Passou Q1</span><b id="qtQ1">–</b></div>
              <div class="abrow"><span>WhatsApp</span><b id="qtWhatsapp">–</b></div>
              <div class="abrow"><span>Foto</span><b id="qtPhoto">–</b></div>
              <div class="abrow"><span>Checkout</span><b id="qtCheckout">–</b></div>
              <div class="abrow"><span>Vendas</span><b id="qtPaid">–</b></div>
              <div class="abrow"><span>Conversão</span><b id="qtConv">–</b></div>
              <div class="abrow hl"><span>R$ / visitante</span><b id="qtRpv">–</b></div>
            </div>
            <div class="abcol" id="quizHomenagem">
              <div class="gw">🖼️ /homenagem <small>prévia inline</small></div>
              <div class="abrow"><span>Mandados</span><b id="qhAssigned">–</b></div>
              <div class="abrow"><span>Iniciou quiz</span><b id="qhStarted">–</b></div>
              <div class="abrow"><span>Passou Q1</span><b id="qhQ1">–</b></div>
              <div class="abrow"><span>WhatsApp</span><b id="qhWhatsapp">–</b></div>
              <div class="abrow"><span>Foto</span><b id="qhPhoto">–</b></div>
              <div class="abrow"><span>Prévia</span><b id="qhPreview">–</b></div>
              <div class="abrow"><span>Checkout</span><b id="qhCheckout">–</b></div>
              <div class="abrow"><span>Vendas</span><b id="qhPaid">–</b></div>
              <div class="abrow"><span>Conversão</span><b id="qhConv">–</b></div>
              <div class="abrow hl"><span>R$ / visitante</span><b id="qhRpv">–</b></div>
            </div>
          </div>
          <div class="ab-note" id="quizAbNote"></div>
        </div>
        <div class="abwrap" id="abWrap" hidden>
          <h4>🧪 A/B Checkout · Cakto × Yampi <span class="ab-since" id="abSince"></span></h4>
          <div class="abgrid">
            <div class="abcol" id="abCakto">
              <div class="gw">🟦 Cakto</div>
              <div class="abrow"><span>Mandados</span><b id="cAssigned">–</b></div>
              <div class="abrow"><span>Vendas</span><b id="cPaid">–</b></div>
              <div class="abrow"><span>Recuperação (Pix)</span><b id="cRec">–</b></div>
              <div class="abrow"><span>Conversão</span><b id="cConv">–</b></div>
              <div class="abrow"><span>Ticket médio</span><b id="cTicket">–</b></div>
              <div class="abrow hl"><span>R$ / visitante</span><b id="cRpv">–</b></div>
            </div>
            <div class="abcol" id="abYampi">
              <div class="gw">🟩 Yampi <small>(MP + bumps)</small></div>
              <div class="abrow"><span>Mandados</span><b id="yAssigned">–</b></div>
              <div class="abrow"><span>Vendas</span><b id="yPaid">–</b></div>
              <div class="abrow"><span>Recuperação (Pix)</span><b id="yRec">–</b></div>
              <div class="abrow"><span>Conversão</span><b id="yConv">–</b></div>
              <div class="abrow"><span>Ticket médio</span><b id="yTicket">–</b></div>
              <div class="abrow hl"><span>R$ / visitante</span><b id="yRpv">–</b></div>
            </div>
          </div>
          <div class="ab-note" id="abNote"></div>
        </div>`;
      anaBuilt=true;
      if(lastQuizAbData) paintQuizAB(lastQuizAbData);
      if(lastCheckoutAbData) paintAB(lastCheckoutAbData);
    }

    function paintFunnel(d){
      lastAnaData=d;
      const f=(d&&(FUNNEL_MODE==='homenagem'?d.funnelH:d.funnel))||[];
      if(!anaBuilt){ if(!f.length){$('funnelView').innerHTML='<div class="ana-loading">Sem dados ainda para este funil.</div>';return} buildFunnelSkeleton(f); }
      const chart=$('fchart'); if(!chart)return;
      const top=Math.max(1,(f[0]&&f[0].count)||0);
      let maxDropIdx=-1,maxDrop=0; // maior QUEDA EM VOLUME (onde se perde mais gente), não % relativo
      for(let i=1;i<f.length;i++){const drop=(f[i-1].count||0)-(f[i].count||0);if(drop>maxDrop){maxDrop=drop;maxDropIdx=i}}
      const total=f.reduce((a,s)=>a+(s.count||0),0);
      const fEmpty=$('fEmpty'); if(fEmpty)fEmpty.hidden=total>0;
      chart.style.opacity=total>0?'1':'.22';
      const heights=[];
      f.forEach((s,i)=>{
        const col=chart.querySelector(`.fcol[data-step="${s.step}"]`); if(!col)return;
        const cnt=s.count||0;
        const pctTop=Math.max(0,Math.min(100,Math.round((cnt/top)*100)));
        const prev=i>0?(f[i-1].count||0):null;
        const keep=(prev!=null&&prev>0)?Math.round((cnt/prev)*100):null;
        const isDrop=(i===maxDropIdx&&maxDrop>0);
        col.querySelector('.fcount').textContent=cnt;
        col.querySelector('.fpct').textContent=pctTop+'%';
        const k=col.querySelector('.fkeep'); k.textContent=keep!=null?(keep+'% do anterior'+(isDrop?' 👈':'')):''; k.className='fkeep'+(isDrop?' warn':'');
        const bar=col.querySelector('.fbar'); bar.classList.toggle('drop',isDrop); bar.classList.toggle('has',cnt>0);
        heights.push([bar,pctTop]);
      });
      requestAnimationFrame(()=>heights.forEach(([bar,h])=>{bar.style.height=h+'%'}));
      const sl=(d&&d.sales)||{}, conv=(sl.oferta>0)?Math.round((sl.pago/sl.oferta)*100):0;
      if($('kOferta'))$('kOferta').textContent=sl.oferta||0;
      if($('kRecup'))$('kRecup').textContent=sl.recuperacao||0;
      if($('kPago'))$('kPago').textContent=sl.pago||0;
      if($('kConv'))$('kConv').textContent=conv+'%';
      anaSinceISO=(d&&d.trackingSince)||null;
      if($('anaSince'))$('anaSince').textContent=anaSinceISO?fmtFull(anaSinceISO):'aguardando 1º evento';
      anaLastUpdate=Date.now(); updateAnaAgo();
    }

    const AB_MIN_N=10; // amostra mínima por lado antes de cravar vencedor
    function paintAB(d){
      lastCheckoutAbData=d;
      const ab=d&&d.ab, w=$('abWrap'); if(!w)return;
      if(!ab){ w.hidden=true; return; }
      w.hidden=false;
      const set=(id,v)=>{const e=$(id); if(e)e.textContent=v;};
      const money=v=>v==null?'–':('R$ '+Number(v).toFixed(2).replace('.',','));
      const pct=v=>v==null?'–':(v+'%');
      const c=ab.cakto||{}, y=ab.yampi||{};
      set('cAssigned',c.assigned||0); set('cPaid',c.paid||0); set('cRec',c.recuperacao||0); set('cConv',pct(c.conversion)); set('cTicket',money(c.ticket)); set('cRpv',money(c.rev_per_visitor));
      set('yAssigned',y.assigned||0); set('yPaid',y.paid||0); set('yRec',y.recuperacao||0); set('yConv',pct(y.conversion)); set('yTicket',money(y.ticket)); set('yRpv',money(y.rev_per_visitor));
      $('abCakto').classList.remove('win'); $('abYampi').classList.remove('win');
      w.querySelectorAll('.win-tag').forEach(t=>t.remove());
      const cv=c.rev_per_visitor||0, yv=y.rev_per_visitor||0;
      let note;
      if((c.assigned||0)<AB_MIN_N||(y.assigned||0)<AB_MIN_N){
        note='⏳ Amostra ainda pequena (ideal ~'+AB_MIN_N+'+ visitantes por lado). Deixe rodar antes de decidir.';
      } else if(Math.abs(cv-yv)<0.01){
        note='Empate técnico em R$/visitante. Continue coletando.';
      } else {
        const winId=yv>cv?'abYampi':'abCakto', winName=yv>cv?'Yampi':'Cakto';
        $(winId).classList.add('win');
        const tag=document.createElement('span'); tag.className='win-tag'; tag.textContent='🏆 na frente'; $(winId).appendChild(tag);
        const diff=Math.abs(yv-cv)/Math.max(0.01,Math.min(cv,yv))*100;
        note='🏆 <b>'+winName+'</b> está faturando ~'+diff.toFixed(0)+'% mais por visitante. Com volume suficiente, pode virar 100% pra ele.';
      }
      const n=$('abNote'); if(n)n.innerHTML=note;
      const s=$('abSince'); if(s)s.textContent='· desde 24/06 (início do teste)';
    }

    function paintQuizAB(d){
      lastQuizAbData=d;
      const ab=d&&d.quizAb, w=$('quizAbWrap'); if(!w)return;
      if(!ab){ w.hidden=true; return; }
      w.hidden=false;
      const set=(id,v)=>{const e=$(id); if(e)e.textContent=v;};
      const money=v=>v==null?'–':('R$ '+Number(v).toFixed(2).replace('.',','));
      const pct=v=>v==null?'–':(v+'%');
      const t=ab.typebot||{}, h=ab.homenagem||{};
      set('qtAssigned',t.assigned||0); set('qtStarted',(t.started||0)+' · '+pct(t.started_rate)); set('qtQ1',t.answered1||0); set('qtWhatsapp',(t.whatsapp||0)+' · '+pct(t.whatsapp_rate)); set('qtPhoto',(t.photo||0)+' · '+pct(t.photo_rate)); set('qtCheckout',(t.checkout||0)+' · '+pct(t.checkout_rate)); set('qtPaid',t.paid||0); set('qtConv',pct(t.conversion)); set('qtRpv',money(t.rev_per_visitor));
      set('qhAssigned',h.assigned||0); set('qhStarted',(h.started||0)+' · '+pct(h.started_rate)); set('qhQ1',h.answered1||0); set('qhWhatsapp',(h.whatsapp||0)+' · '+pct(h.whatsapp_rate)); set('qhPhoto',(h.photo||0)+' · '+pct(h.photo_rate)); set('qhPreview',h.preview==null?'–':h.preview); set('qhCheckout',(h.checkout||0)+' · '+pct(h.checkout_rate)); set('qhPaid',h.paid||0); set('qhConv',pct(h.conversion)); set('qhRpv',money(h.rev_per_visitor));
      $('quizTypebot').classList.remove('win'); $('quizHomenagem').classList.remove('win');
      w.querySelectorAll('.win-tag').forEach(x=>x.remove());
      const tv=t.rev_per_visitor||0, hv=h.rev_per_visitor||0;
      let note;
      if((t.assigned||0)<AB_MIN_N||(h.assigned||0)<AB_MIN_N){
        note='⏳ Amostra ainda pequena (ideal ~'+AB_MIN_N+'+ cliques por lado). O split já está ativo; deixe rodar antes de decidir.';
      } else if(Math.abs(tv-hv)<0.01){
        note='Empate técnico em R$/visitante. Olhe também WhatsApp, foto e checkout antes de mexer no tráfego.';
      } else {
        const winId=hv>tv?'quizHomenagem':'quizTypebot', winName=hv>tv?'/homenagem':'Typebot';
        $(winId).classList.add('win');
        const tag=document.createElement('span'); tag.className='win-tag'; tag.textContent='🏆 na frente'; $(winId).appendChild(tag);
        const diff=Math.abs(hv-tv)/Math.max(0.01,Math.min(tv,hv))*100;
        note='🏆 <b>'+winName+'</b> está gerando ~'+diff.toFixed(0)+'% mais R$/visitante neste recorte.';
      }
      const n=$('quizAbNote'); if(n)n.innerHTML=note;
      const s=$('quizAbSince'); if(s)s.textContent='· CTA da landing dividido 50/50';
    }

    function updateAnaAgo(){
      const el=$('anaAgo'); if(!el||!anaLastUpdate)return;
      const s=Math.round((Date.now()-anaLastUpdate)/1000);
      el.textContent = s<5?'agora':s<60?('há '+s+'s'):s<3600?('há '+Math.floor(s/60)+'min'):('às '+new Date(anaLastUpdate).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));
    }
    function setAnaLive(err){const d=document.querySelector('.ana-livedot'); if(d)d.style.background=err?'var(--danger)':'';}

    // monta os params da análise a partir do range escolhido (from/to ISO); vazio = Tudo
    function anaParams(){ const {fromISO,toISO}=dateBounds(ANA_FROM,ANA_TO); if(!fromISO&&!toISO) return {period:'tudo'}; const p={}; if(fromISO)p.from=fromISO; if(toISO)p.to=toISO; return p; }
    // A/B só existe a partir do deploy do teste; nunca contar antes (senão vendas antigas inflam a Cakto)
    const AB_START='2026-06-24T17:55:00.000Z';
    function abParams(){ const p=anaParams(); const out={}; if(p.to)out.to=p.to; out.from=(p.from&&p.from>AB_START)?p.from:AB_START; return out; }
    // reflete ANA_FROM/ANA_TO nos inputs + destaca o preset correspondente
    function syncAnaControls(){ const F=$('anaFrom'),T=$('anaTo'); if(F)F.value=ANA_FROM; if(T)T.value=ANA_TO; const k=detectPreset(ANA_FROM,ANA_TO); document.querySelectorAll('#analytics .ana-periods .p').forEach(p=>p.classList.toggle('on',p.dataset.preset===k)); }
    async function refreshAnalytics(silent){
      if(silent&&document.hidden)return;
      try{
        const d=await api('analytics',anaParams()); paintFunnel(d); setAnaLive(false);
        try{ const q=await api('quiz_ab',anaParams()); paintQuizAB(q); }catch(_e){/* A/B quiz é complementar; não quebra a análise */}
        try{ const a=await api('ab',abParams()); paintAB(a); }catch(_e){/* A/B é complementar; não quebra a análise */}
      }
      catch(e){
        if(e&&e.code===401){stopAnaAuto();handleErr(e);return}
        if(!anaBuilt)$('funnelView').innerHTML='<div class="ana-loading">Erro ao carregar a análise.'+(e&&e.detail?' '+esc(e.detail):'')+'</div>';
        setAnaLive(true);
      }
    }
    async function loadAnalytics(){ if(!anaBuilt)$('funnelView').innerHTML='<div class="ana-loading">Carregando análise…</div>'; await refreshAnalytics(false); }
    function startAnaAuto(){ stopAnaAuto(); anaTimer=setInterval(()=>refreshAnalytics(true),20000); anaTick=setInterval(updateAnaAgo,1000); }
    function stopAnaAuto(){ clearInterval(anaTimer);clearInterval(anaTick);anaTimer=anaTick=null; }
    function openAnalytics(){ $('analytics').style.display='flex'; syncAnaControls(); loadAnalytics(); startAnaAuto(); }
    function closeAnalytics(){ $('analytics').style.display='none'; stopAnaAuto(); }

    $('btnAnalytics').addEventListener('click',openAnalytics);
    $('anaClose').addEventListener('click',closeAnalytics);
    document.addEventListener('keydown',e=>{if(e.key==='Escape'&&$('analytics').style.display==='flex')closeAnalytics()});
    document.querySelectorAll('#analytics .ana-periods .p').forEach(b=>b.addEventListener('click',()=>{
      const [a,c]=PRESETS[b.dataset.preset](); ANA_FROM=a; ANA_TO=c; syncAnaControls(); refreshAnalytics(false);
    }));
    $('anaFrom').addEventListener('change',e=>{ ANA_FROM=e.target.value||''; syncAnaControls(); refreshAnalytics(false); });
    $('anaTo').addEventListener('change',e=>{ ANA_TO=e.target.value||''; syncAnaControls(); refreshAnalytics(false); });
    let lockTimer=null;
    function lockLogin(secs){
      const btn=$('loginForm').querySelector('button'), inp=$('senha');
      clearInterval(lockTimer); secs=Math.max(1,Math.ceil(secs||30));
      const tick=()=>{
        if(secs<=0){clearInterval(lockTimer);btn.disabled=false;inp.disabled=false;$('loginErro').textContent='';return}
        btn.disabled=true;inp.disabled=true;$('loginErro').textContent=`🔒 Muitas tentativas. Aguarde ${secs}s…`;secs--;
      };
      tick();lockTimer=setInterval(tick,1000);
    }
    $('loginForm').addEventListener('submit',async e=>{
      e.preventDefault();$('loginErro').textContent='';
      const v=$('senha').value.trim();if(!v){$('loginErro').textContent='Digite a senha.';return}
      token=v;
      try{await api('list');sessionStorage.setItem(TKEY,token);$('senha').value='';showApp();await load();startAuto()}
      catch(e){
        token='';
        if(e&&e.code===429){lockLogin(e.retryAfter)}
        else if(e&&e.code===401){$('loginErro').textContent='Senha incorreta.'+(e.remaining>0?` (${e.remaining} ${e.remaining===1?'tentativa':'tentativas'} restante${e.remaining===1?'':'s'})`:'')}
        else{$('loginErro').textContent='Erro ao conectar.'}
      }
    });

    // PWA: instalar
    window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;$('btnInstall').style.display='inline-flex'});
    $('btnInstall').addEventListener('click',async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;$('btnInstall').style.display='none'});
    window.addEventListener('appinstalled',()=>{$('btnInstall').style.display='none';toast('App instalado ✓','ok')});
    if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/hub/sw.js',{scope:'/hub/'}).catch(()=>{}))}

    applyA11y(); // tag inicial dos controles estáticos (presets de data, períodos)
    if(token){showApp();load();startAuto()}else{showLogin()}
  </script>
</body>
