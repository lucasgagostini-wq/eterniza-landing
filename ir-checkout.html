<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Redirecionando…</title>
<style>
  html,body{margin:0;height:100%;background:#0a0a0c;color:#e7cfa3;font-family:system-ui,-apple-system,sans-serif;display:grid;place-items:center;text-align:center;padding:24px}
  .msg{font-size:15px;opacity:.92}
  .dbg{font-size:12px;color:#9a8459;word-break:break-all;max-width:92vw;margin-top:14px}
</style>
</head>
<body>
  <div>
    <div class="msg">🔒 Levando você ao pagamento seguro…</div>
    <div class="dbg" id="dbg"></div>
  </div>
  <script>
    // Ponte bot -> Yampi: leva o telefone do bot como metadata[bot_phone] (e nome como bot_name).
    // O metadata volta no webhook (order.*), então o pagamento FUNDE com o lead do bot (com foto)
    // pelo phone_normalized — INDEPENDENTE do telefone que o cliente digitar no checkout.
    // (migrado de Cakto p/ Yampi em 2026-06-24; recebe em /api/yampi-webhook.)
    (function () {
      var YAMPI = 'https://eterniza.pay.yampi.com.br/r/E8VSH1ZWAB';
      var q = new URLSearchParams(location.search);
      var nome = (q.get('nome') || q.get('name') || '').trim();
      var phone = (q.get('phone') || q.get('whatsapp') || '').replace(/\D/g, '');
      if (phone && phone.length <= 11) phone = '55' + phone;
      // Yampi: metadata[chave]=valor (colchete literal, valor encodado) — sobrevive até o webhook.
      var parts = [];
      if (phone) parts.push('metadata[bot_phone]=' + encodeURIComponent(phone));
      if (nome) parts.push('metadata[bot_name]=' + encodeURIComponent(nome));
      ['utm_source', 'utm_campaign', 'utm_medium', 'utm_content', 'utm_term'].forEach(function (k) {
        var v = q.get(k); if (v) parts.push(k + '=' + encodeURIComponent(v));
      });
      var url = YAMPI + (parts.length ? ('?' + parts.join('&')) : '');
      if (q.get('debug') === '1') { document.getElementById('dbg').textContent = url; return; }
      location.replace(url);
    })();
  </script>
</body>
</html>
